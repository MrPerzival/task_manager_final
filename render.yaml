# render.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Place this file at the ROOT of your GitHub repository.
# Render auto-detects it and provisions PostgreSQL + the API service.
#
# Docs: https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: task-manager-db
    databaseName: taskdb
    user: taskuser
    plan: free               # upgrade to "starter" for persistent DB beyond 90 days

services:
  - type: web
    name: task-manager-api
    runtime: python
    plan: free               # upgrade to "starter" for always-on (no spin-down)

    # Python version — CRITICAL: pins to 3.11 to avoid pydantic-core
    # Rust compile failure on Python 3.14 (Render's current default)
    pythonVersion: "3.11.9"

    # Path to the backend source within the repo.
    # If your repo root contains backend/ directly, use: backend
    # If you pushed only the backend folder as the repo root, use: .
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      # Automatically wired from the managed PostgreSQL database above
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString

      - key: LOG_LEVEL
        value: INFO

      # Change to your production domain(s) once deployed:
      # value: https://myapp.com,https://staging.myapp.com
      - key: ALLOWED_ORIGINS
        value: "*"

      # Render requires port 10000
      - key: PORT
        value: "10000"

    # Render pings this URL after every deploy to confirm the service is up
    healthCheckPath: /
