databases:
  - name: task-manager-db
    databaseName: taskdb
    user: taskuser
    plan: free

services:
  - type: web
    name: task-manager-api
    runtime: python
    plan: free

    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString

      - key: LOG_LEVEL
        value: INFO

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: PORT
        value: "10000"

    healthCheckPath: /
