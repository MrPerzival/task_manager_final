# .github/workflows/ci.yml
# CI pipeline — runs on every push / PR to main or develop.
#
# Jobs:
#   test   — pytest suite on Python 3.11 and 3.12 (in-memory SQLite)
#   lint   — ruff + black check
#   docker — build image + smoke-test the health endpoint

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

jobs:

  test:
    name: "pytest (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          LOG_LEVEL: "WARNING"
        run: pytest --tb=short -q

  lint:
    name: "Lint & format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters
        run: pip install ruff black
      - name: ruff
        run: ruff check . --select E,F,W,I --ignore E501
      - name: black
        run: black --check --diff .

  docker:
    name: "Docker build + smoke test"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t task-manager-api:ci backend/

      - name: Smoke test
        run: |
          docker run -d --name api \
            -e DATABASE_URL="sqlite:///./tasks.db" \
            -e PORT=8000 \
            -p 8000:8000 \
            task-manager-api:ci

          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"; break
            fi
            sleep 1
          done

          curl -sf http://localhost:8000/ | grep '"status":"ok"'

      - name: Cleanup
        if: always()
        run: docker rm -f api || true
